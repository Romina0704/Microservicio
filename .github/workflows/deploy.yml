name: Deploy Microservicio Pedido

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/pedido:latest .

      - name: Subir imagen a DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pedido:latest

      - name: Desplegar en la VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/pedido
            
            docker-compose down 
            docker-compose pull
            docker-compose up -d