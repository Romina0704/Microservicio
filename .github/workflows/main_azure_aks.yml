name: Deploy Microservice to Azure AKS

on:
  push:
    branches: [ "main" ] # Se activa al subir cambios a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Obtener el código fuente
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar entorno Java para compilar el microservicio
      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Empaquetar el microservicio (Capa CI)
      - name: Compilar con Maven
        run: mvn clean package -DskipTests
        working-directory: .

      # 4. Autenticación en Azure Container Registry (ACR)
      - name: Login en Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 5. Construir y subir la imagen a su registro privado en Azure
      - name: Build y Push de la imagen a ACR
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/ijaramillo-msdemo:latest ./microservicio-demo
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ijaramillo-msdemo:latest

      # 6. Autenticación en Azure (para gestionar el clúster)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 7. Obtener credenciales del clúster AKS
      - name: Configurar contexto de AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      # 8. Despliegue de manifiestos en Kubernetes (Capa CD)
      - name: Desplegar en AKS
        uses: azure/k8s-deploy@v1
        with:
          manifests: |
            k8s/mysql-pvc.yaml
            k8s/mysql-deploy.yaml
            k8s/microservicio-demo-deployment.yaml
          images: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ijaramillo-msdemo:latest

