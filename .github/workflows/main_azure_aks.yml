name: Deploy Microservice to Azure AKS

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar con Maven
        run: mvn clean package -DskipTests

      - name: Login en Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build y Push de la imagen
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/ijaramillo-msdemo:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ijaramillo-msdemo:latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configurar contexto de AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      - name: Desplegar en AKS
        uses: azure/k8s-deploy@v1
        with:
          manifests: |
            k8s/mysql-pvc.yaml
            k8s/mysql-deploy.yaml
            k8s/microservicio-demo-deployment.yaml
          images: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ijaramillo-msdemo:latest
