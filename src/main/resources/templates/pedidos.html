<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Pedidos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f6fb;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .menu-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px 40px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.15);
            margin-bottom: 40px;
        }

        .menu-header h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .menu-header p {
            color: #e0e0ff;
            font-size: 1.1rem;
        }

        /* ===== CONTENIDO ===== */
        .main-content {
            padding: 0 20px 40px;
        }

        .page-title {
            text-align: center;
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* ===== BOTÓN ===== */
        .btn-add {
            background: #4ade80;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #22c55e;
            transform: translateY(-1px);
        }

        /* ===== TABLA ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 14px;
            text-align: center;
            vertical-align: middle;
        }

        th {
            background: #eef1f7;
            color: #333;
            font-weight: 600;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f9fafc;
        }

        /* ===== ACCIONES ===== */
        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .actions button {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .btn-edit {
            background: #6c63ff;
        }

        .btn-edit:hover {
            background: #574fe3;
            transform: scale(1.05);
        }

        .btn-delete {
            background: #ff6b6b;
        }

        .btn-delete:hover {
            background: #e55353;
            transform: scale(1.05);
        }

        /* ===== ESTADOS ===== */
        .estado-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            font-size: 13px;
        }

        .estado-creado { background: #facc15; }
        .estado-confirmado { background: #7b68ee; }
        .estado-entregado { background: #22c55e; }
        .estado-cancelado { background: #ef4444; }

        /* ===== MODALES ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .modal-content button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-save {
            background: #4ade80;
            color: white;
        }

        .btn-cancel {
            background: #e5e7eb;
        }
    </style>
</head>

<body>

<div class="menu-header">
    <h1>📦 Sistema de Pedidos</h1>
    <p>Gestión y control de pedidos</p>
</div>

<div class="main-content">
    <h1 class="page-title">Gestión de Pedidos</h1>

    <div class="container">
        <button class="btn-add" onclick="openAddModal()">➕ Nuevo Pedido</button>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${pedidos}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.fechaPedido}"></td>
                <td>
                    <span th:text="${p.estado}"
                          th:class="'estado-badge estado-' + ${#strings.toLowerCase(p.estado)}">
                    </span>
                </td>
                <td class="actions">
                    <button class="btn-edit"
                            th:data-id="${p.id}"
                            th:data-fecha="${p.fechaPedido}"
                            th:data-estado="${p.estado}"
                            onclick="openEditModal(this)">✏️</button>

                    <form th:action="@{/pedidos/eliminar/{id}(id=${p.id})}" method="post">
                        <button class="btn-delete" type="submit">🗑️</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- MODAL AGREGAR -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>Nuevo Pedido</h3>
        <form th:action="@{/pedidos/agregar}" method="post">
            <input type="date" name="fechaPedido" required>
            <select name="estado" required>
                <option value="">Seleccione estado</option>
                <option value="CREADO">Creado</option>
                <option value="CONFIRMADO">Confirmado</option>
                <option value="ENTREGADO">Entregado</option>
                <option value="CANCELADO">Cancelado</option>
            </select>
            <button class="btn-save" type="submit">Guardar</button>
            <button class="btn-cancel" type="button" onclick="closeAddModal()">Cancelar</button>
        </form>
    </div>
</div>

<!-- MODAL EDITAR -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Editar Pedido</h3>
        <form th:action="@{/pedidos/editar}" method="post">
            <input type="hidden" name="id" id="editId">
            <input type="date" name="fechaPedido" id="editFecha" required>
            <select name="estado" id="editEstado" required>
                <option value="CREADO">Creado</option>
                <option value="CONFIRMADO">Confirmado</option>
                <option value="ENTREGADO">Entregado</option>
                <option value="CANCELADO">Cancelado</option>
            </select>
            <button class="btn-save" type="submit">Guardar</button>
            <button class="btn-cancel" type="button" onclick="closeEditModal()">Cancelar</button>
        </form>
    </div>
</div>

<script>
    function openAddModal() {
        document.getElementById("addModal").style.display = "flex";
    }

    function closeAddModal() {
        document.getElementById("addModal").style.display = "none";
    }

    function openEditModal(btn) {
        document.getElementById("editId").value = btn.dataset.id;
        document.getElementById("editFecha").value = btn.dataset.fecha;
        document.getElementById("editEstado").value = btn.dataset.estado;
        document.getElementById("editModal").style.display = "flex";
    }

    function closeEditModal() {
        document.getElementById("editModal").style.display = "none";
    }
</script>

</body>
</html>
