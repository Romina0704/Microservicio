apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservicio-demo
spec:
  replicas: 2 # Aquí demostramos la Alta Disponibilidad (2 instancias)
  selector:
    matchLabels:
      app: microservicio-demo
  template:
    metadata:
      labels:
        app: microservicio-demo
    spec:
      containers:
      - name: microservicio-demo
        image: acrivancho.azurecr.io/ijaramillo-msdemo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/mydb?useSSL=false"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "123456"
---
apiVersion: v1
kind: Service
metadata:
  name: microservicio-demo-service
spec:
  type: LoadBalancer # Esto le pedirá a Azure una IP PÚBLICA
  ports:
    - port: 80
      targetPort: 8082
  selector:
    app: microservicio-demo
