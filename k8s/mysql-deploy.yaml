apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - image: mysql:8.0 # Usamos la misma versión que en su VM
        name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "123456" # En su libro, mencione que esto debería ir en un 'Secret'
        - name: MYSQL_DATABASE
          value: "mydb"
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: mysql # Este es el 'hostname' que usará Spring Boot
spec:
  ports:
    - port: 3306
  selector:
    app: mysql
  clusterIP: None # DNS interno rápido
